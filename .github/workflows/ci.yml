name: Backend CI

on:
  push:
    branches: [ main ]

jobs:

  build-backend:

    runs-on: ubuntu-latest


    defaults:
      run:
        working-directory: backend

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17


      - name: Build and test backend
        run: ./mvnw clean verify